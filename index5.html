<html>
    <head>
        <title>Ecommerce Website</title>
        <link rel="stylesheet" href="style5.css">
        <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    </head>
    <body>
        <!-- Header -->
        <header>
            <div class="nav container">
                <a href="#" class="logo">Ecommerce</a>
                <i class='bx bx-shopping-bag' id="cart-icon"></i>

                <!-- cart -->
                <div class="cart">
                    <h2 class="cart-title">Your Cart</h2>
                    <!-- content -->
                    <div class="cart-content">
                        <!-- <div class="cart-box">
                            <img src="img/product2.jpg" alt="" class="cart-image">
                            <div class="detail-box">
                                <div class="cart-product-title">Earbuds</div>
                                <div class="cart-price">$25</div>
                                <input type="number" value="1" class="cart-quantity">
                            </div> 
                            <i class='bx bxs-trash-alt cart-remove'></i>
                        </div> -->
                    </div>
                    <!-- total -->
                    <div class="total">
                        <div class="total-title">Total</div>
                        <div class="total-price">$0</div>
                    </div>
                    <!-- buy button -->
                    <button type="button" class="btn-buy" onclick="btnbuy()">Buy Now</button>
                    <!-- cart close -->
                    <i class='bx bx-x' id="close-cart"></i>
                </div>

            </div>
        </header>
        <!-- shop -->
        <section class="shop container">
            <h2 class="section-title">Shop Products</h2>
            <!-- content -->
            <div class="shop-content">
                <!-- box1 -->
                <div class="product-box">
                    <img src="product1.jpg" alt="" class="product-image">
                    <h2 class="product-title">AeroReady Shirt</h2>
                    <span class="price">$25</span>
                    <i class='bx bx-shopping-bag add-cart'></i>
                </div>
                <!-- box2 -->
                <div class="product-box">
                    <img src="product2.jpg" alt="" class="product-image">
                    <h2 class="product-title">WireLess AirBuds</h2>
                    <span class="price">$100</span>
                    <i class='bx bx-shopping-bag add-cart'></i>
                </div>
                <!-- box3 -->
                <div class="product-box">
                    <img src="product3.jpg" alt="" class="product-image">
                    <h2 class="product-title">Hooded Parka</h2>
                    <span class="price">$100</span>
                    <i class='bx bx-shopping-bag add-cart'></i>
                </div>
                <!-- box4 -->
                <div class="product-box">
                    <img src="product4.jpg" alt="" class="product-image">
                    <h2 class="product-title">Straw Metal Bottle</h2>
                    <span class="price">$24.04</span>
                    <i class='bx bx-shopping-bag add-cart'></i>
                </div>
                <!-- box5 -->
                <div class="product-box">
                    <img src="product5.jpg" alt="" class="product-image">
                    <h2 class="product-title">Silver Metal Sunglasses</h2>
                    <span class="price">$50</span>
                    <i class='bx bx-shopping-bag add-cart'></i>
                </div>
                <!-- box6 -->
                <div class="product-box">
                    <img src="product6.jpg" alt="" class="product-image">
                    <h2 class="product-title">Back Hat</h2>
                    <span class="price">$50</span>
                    <i class='bx bx-shopping-bag add-cart'></i>
                </div>
                <!-- box7 -->
                <div class="product-box">
                    <img src="product7.jpg" alt="" class="product-image">
                    <h2 class="product-title">BackPack</h2>
                    <span class="price">$70</span>
                    <i class='bx bx-shopping-bag add-cart'></i>
                </div>
                <!-- box8 -->
                <div class="product-box">
                    <img src="product8.jpg" alt="" class="product-image">
                    <h2 class="product-title">UltraBoost 22</h2>
                    <span class="price">$45</span>
                    <i class='bx bx-shopping-bag add-cart'></i>
                </div>
                <div id="cart">
  
            </div>
        </section>



        <script src="script5.js"></script>
        
    </body>
</html>
